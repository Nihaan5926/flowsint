name: flowsint-prod

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    networks:
      - flowsint_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - flowsint_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    restart: always
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data_prod:/data
    networks:
      - flowsint_network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USERNAME} -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: flowsint-api/Dockerfile
      target: production
    restart: always
    # No ports needed: Traefik handles it
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEO4J_URI_BOLT=${NEO4J_URI_BOLT}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - MASTER_VAULT_KEY_V1=${MASTER_VAULT_KEY_V1}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      neo4j: { condition: service_healthy }
    networks:
      - flowsint_network

  celery:
    build:
      context: .
      dockerfile: flowsint-api/Dockerfile
      target: production
    restart: always
    command: ["celery", "-A", "flowsint_core.core.celery", "worker", "--loglevel=info", "--pool=threads", "--concurrency=10"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MASTER_VAULT_KEY_V1=${MASTER_VAULT_KEY_V1}
    networks:
      - flowsint_network

  app:
    build:
      context: ./flowsint-app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    restart: always
    # No ports needed: Traefik handles it
    networks:
      - flowsint_network
    depends_on:
      api: { condition: service_healthy }

networks:
  flowsint_network:
    driver: bridge

volumes:
  pg_data_prod:
  neo4j_data_prod:
